name: Run Addition Program

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  addition-job:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # Step 3: Run the addition program
      - name: Run addition script
        run: |
          python add.py
